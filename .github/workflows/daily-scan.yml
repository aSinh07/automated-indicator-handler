name: Daily Threat Intelligence Update

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Run Threat Scraper
      run: python scraper.py

    - name: Commit and Push Changes
      run: |
        git config --global user.name "Aman Dev"
        git config --global user.email "aman20dev05@gmail.com"
        
        git add LATEST_THREATS.md
        
        git diff --quiet && git diff --staged --quiet || git commit -m "Automated Feed Update: $(date -u +'%Y-%m-%d %H:%M:%S') UTC"
        
        git pull --rebase origin main
        git push
